    .btn{

      overflow:hidden;
      transition:.3s;

    }

    .card:hover{
      transform:scale(1.03);
      border-color:#b44cff;
    }

    .img{
      height:150px;
      background:#111;
      background-size:cover;
      background-position:center;
    }

    .card h3{
      padding:10px;

    }

    .hint{

    }

  </style></head><body><header>

</section><div class="category">Juegos AAA destacados</div><section class="section">
  <div class="grid" id="gamesGrid"><div class="card" data-name="elden ring rpg souls">
  <div class="img"></div>
  <h3>Elden Ring</h3>
</div>

<div class="card" data-name="gta v action mundo abierto">

</div>

<div class="card" data-name="call of duty fps shooter">

</div>

<div class="card" data-name="minecraft sandbox survival">
  <div class="img"></div>

  </div>
</section><div class="category">Catálogo completo (demo expandible)</div><section class="section">
  <div class="grid" id="allGames"><div class="card" data-name="fifa sports futbol">
  <div class="img"></div>
  <h3>FIFA</h3>
</div>

<div class="card" data-name="fortnite battle royale">
  <div class="img"></div>
  <h3>Fortnite</h3>
</div>

<div class="card" data-name="valorant fps tactical">
  <div class="img"></div>
  <h3>Valorant</h3>
</div>

<div class="card" data-name="resident evil horror">
  <div class="img"></div>
  <h3>Resident Evil</h3>
</div>

  </div>
</section><script>

// ============================
// BUSCADOR
// ============================
function filterGames(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let name = card.getAttribute("data-name");

    if(name.includes(input)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}

// ============================
// BASE DE DATOS DEMO
// ============================
const games = [
  {name:"Elden Ring", genre:"RPG Souls"},
  {name:"GTA V", genre:"Mundo Abierto"},
  {name:"Cyberpunk 2077", genre:"Sci-Fi RPG"},
  {name:"Minecraft", genre:"Sandbox"},
  {name:"Call of Duty", genre:"Shooter"},
  {name:"Resident Evil", genre:"Horror"},
  {name:"Valorant", genre:"FPS"},
  {name:"Fortnite", genre:"Battle Royale"},
  {name:"FIFA", genre:"Deportes"},
  {name:"Red Dead Redemption 2", genre:"Western"},
  {name:"God of War", genre:"Acción"},
  {name:"The Witcher 3", genre:"Fantasy RPG"},
  {name:"League of Legends", genre:"MOBA"},
  {name:"Dota 2", genre:"MOBA"},
  {name:"Counter Strike 2", genre:"Shooter"}
];

// ============================
// GENERADOR AUTOMÁTICO
// ============================
const allGames = document.getElementById("allGames");

for(let game of games){

  let card = document.createElement("div");
  card.className = "card";
  card.setAttribute("data-name", `${game.name.toLowerCase()} ${game.genre.toLowerCase()}`);

  card.innerHTML = `
    <div class="img"></div>
    <h3>${game.name}</h3>
    <div class="hint">${game.genre}</div>
  `;

  allGames.appendChild(card);
}

// ============================
