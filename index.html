<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Gaming</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d14;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
}

.logo {
    color: #b300ff;
    font-weight: bold;
}

/* SEARCH */
.search {
    display: flex;
    align-items: center;
    background: #1a1a2e;
    padding: 5px 10px;
    border-radius: 8px;
}

.search input {
    background: none;
    border: none;
    color: white;
    outline: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 40px;
}

/* CATÁLOGO */
.catalogo {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 20px;
}

.game {
    background: #141424;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
    color: white;
    text-align: center;
}

.game img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.game:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #b300ff;
}
/* OFERTA */
.oferta {
    color: #00e5ff;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
<div class="logo">Anonymous Gaming</div>

<div class="search">
🔍 <input type="text" id="buscador" placeholder="Buscar juegos..." onkeyup="buscar()">
</div>
</header>

<div class="hero">
<h1>Descubre mundos legendarios</h1>
<p>Catálogo estilo Steam cyberpunk</p>
</div>

<div class="catalogo" id="catalogo">

<div class="game" data-nombre="elden ring">
<h3>Elden Ring</h3>
<p class="oferta">RPG legendario</p>
</div>

<div class="game" data-nombre="cyberpunk">
<h3>Cyberpunk 2077</h3>
<p class="oferta">Futuro oscuro</p>
</div>

<div class="game" data-nombre="gta">
<h3>GTA V</h3>
<p class="oferta">Mundo abierto</p>
</div>

</div>

<script>
function buscar() {
    let input = document.getElementById("buscador").value.toLowerCase();
    let juegos = document.querySelectorAll(".game");

    juegos.forEach(juego => {
        let nombre = juego.getAttribute("data-nombre");
        if (nombre.includes(input)) {
            juego.style.display = "block";
        } else {
            juego.style.display = "none";
        }
    });
}
</script>

</body>
</html>
