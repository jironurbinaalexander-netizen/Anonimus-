<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Gaming</title>
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d14;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            color: #ff0055; /* Un toque de color para el título */
            margin-bottom: 30px;
        }

        .contenedor-juegos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .contenedor-juegos img {
            width: 90%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header>
        <h1>Anonymous Gaming</h1>
    </header>

    <div class="contenedor-juegos">
        <img src="https://image.api.playstation.com/vulcan/ap/rnd/202110/2000/a34v7vTIs13g963pSg78EnjL.png" alt="Elden Ring">

        <img src="https://image.api.playstation.com/vulcan/ap/rnd/202111/3013/mof7wSOfp1b8wI8Xf86G11fO.png" alt="Cyberpunk 2077">

        <img src="https://image.api.playstation.com/vulcan/ap/rnd/202202/2823/5G6AnE1vMst7B6LInwWdZAt6.png" alt="GTA V">
    </div>

</body>
</html>
