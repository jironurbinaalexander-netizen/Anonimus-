<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Gaming</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color:white;
    overflow-x:hidden;
}

<div class="catalogo">

  <div class="game" data-nombre="elden ring">
    <img src="images/elden-ring.jpg">

  </div>

  <div class="game" data-nombre="gta v">
    <img src="images/gta.jpg">
    <h3>GTA V</h3>
  </div>

  <div class="game" data-nombre="red dead redemption 2">
    <img src="images/rdr2.jpg">
    <h3>Red Dead Redemption 2</h3>
  </div>

  <div class="game" data-nombre="cyberpunk 2077">
    <img src="images/cyberpunk.jpg">
    <h3>Cyberpunk 2077</h3>
  </div>

  <div class="game" data-nombre="assassin's creed valhalla">
    <img src="images/valhalla.jpg">
    <h3>Assassin’s Creed Valhalla</h3>
  </div>

  <div class="game" data-nombre="horizon forbidden west">
    <img src="images/horizon.jpg">
    <h3>Horizon Forbidden West</h3>
  </div>

  <div class="game" data-nombre="spiderman miles morales">
    <img src="images/spiderman.jpg">
    <h3>Spider-Man Miles Morales</h3>
  </div>

  <div class="game" data-nombre="far cry 6">
    <img src="images/farcry6.jpg">
    <h3>Far Cry 6</h3>
  </div>

</div>
body{
    background: radial-gradient(circle at top, #050805, #000);
    color:white;
    overflow-x:hidden;
}

/* HEADER NEON */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background: rgba(0,0,0,0.7);
    border-bottom: 1px solid rgba(0,255,100,0.4);
    box-shadow: 0 0 15px rgba(0,255,100,0.2);
}

/* LOGO NEON VERDE */
.logo{
    font-size:20px;
    font-weight:bold;
    color:#00ff66;
    text-shadow: 0 0 10px #00ff66;
}

/* BUSCADOR NEON */
.search-box{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 10px;
    border-radius:10px;
    background: rgba(0,0,0,0.6);
    border:1px solid #00ff66;
    box-shadow:0 0 12px rgba(0,255,100,0.4);
}

.search-box input{
    background:transparent;
    border:none;
    outline:none;
    color:white;
}

/* CATÁLOGO */
.catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

/* TARJETAS */
.game{
    background:#0a0f0a;
    border:1px solid rgba(0,255,100,0.2);
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 0 10px rgba(0,255,100,0.1);
}

.game:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(0,255,100,0.6);
}

/* IMAGENES */
.game img{
    width:100%;
    height:140px;
    object-fit:cover;
}
/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:rgba(0,0,0,0.6);
    position:sticky;
    top:0;
}

.logo{
    font-size:20px;
    color:#b300ff;
    font-weight:bold;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

/* BUSCADOR */
.search-box{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(20,20,36,0.8);
    border:1px solid #b300ff;
    padding:6px 10px;
    border-radius:10px;
}

.search-box input{
    background:transparent;
    border:none;
    outline:none;
    color:white;
}

/* CATÁLOGO */
.catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

/* JUEGOS */
.game{
    background:#141424;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
    transition:0.3s;
}

.game:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #b300ff;
}

.game img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.game h3{
    padding:10px;
}

footer{
    text-align:center;
    padding:20px;
    color:#777;
    border-top:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<header>
  <div class="logo">ANONYMOUS <span>GAMING</span></div>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Juegos</a>
    <a href="#">Ofertas</a>
    <a href="#">Soporte</a>
  </nav>

  <div class="search-box">
    <input type="text" id="buscador" placeholder="Buscar juegos..." onkeyup="buscar()">
  </div>
</header>

<!-- CATÁLOGO -->
<div class="catalogo">

  <div class="game" data-nombre="elden ring">
    <img src="images/IMG_20260525_120922.jpg">
    <h3>Elden Ring</h3>
  </div>

  <div class="game" data-nombre="gta v">
    <img src="images/gta.jpg">
    <h3>GTA V</h3>
  </div>

  <div class="game" data-nombre="cyberpunk 2077">
    <img src="images/cyberpunk.jpg">
    <h3>Cyberpunk 2077</h3>
  </div>

  <div class="game" data-nombre="red dead redemption">
    <img src="images/rdr2.jpg">
    <h3>Red Dead Redemption 2</h3>
  </div>

</div>

<footer>
  © Anonymous Gaming - Tienda
</footer>

<script>
function buscar(){
    let input = document.getElementById("buscador").value.toLowerCase();
    let juegos = document.querySelectorAll(".game");

    juegos.forEach(j => {
        let nombre = j.getAttribute("data-nombre");
        j.style.display = nombre.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
